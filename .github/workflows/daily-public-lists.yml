name: "Daily: generate public lists"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate full lists
        run: node scripts/daily/generate-full-lists.js

      - name: Validate generated lists
        run: node scripts/daily/validate-lists.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lists/
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "data: refresh ProtoConsent lists ($DATE)"
          git pull --rebase -X theirs
          git push

      - name: Purge jsDelivr cache
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          OK=0
          FAIL=0
          for f in lists/json/*.json lists/abp/*.txt lists/adguard/*.txt lists/hosts/*.txt lists/domains/*.txt; do
            if curl -sf "https://purge.jsdelivr.net/gh/ProtoConsent/data@main/$f" > /dev/null; then
              echo "Purged $f"
              OK=$((OK + 1))
            else
              echo "Warning: $f failed"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "--- Summary ---"
          echo "Purged: $OK files"
          [ "$FAIL" -gt 0 ] && echo "Failed: $FAIL files"
          echo "Done."
